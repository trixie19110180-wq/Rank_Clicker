<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rank Clicker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">

    <div class="leaderboard">
      <h1>Rank Clicker</h1>
      <div class="points-display">
        Points: <span id="points">0</span>
      </div>
    </div>

    <div class="click-area">
      <button id="clickButton" class="red-button">
        CLICK
      </button>
    </div>

    <div class="upgrades">
      <button id="upgradeClick" class="upgrade-btn">
        Upgrade Click
      </button>

      <button id="upgradeAutoClick" class="upgrade-btn">
        Auto Clicker
      </button>

      <button id="upgradePPS" class="upgrade-btn">
        Points / Second
      </button>
    </div>

  </div>

</body>
</html>
